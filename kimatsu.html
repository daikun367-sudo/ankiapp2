*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#08080f,#0e101e 60%,#060c14);font-family:'Hiragino Kaku Gothic ProN',sans-serif;color:#e8e8f0}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(100,120,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(100,120,255,.035) 1px,transparent 1px);background-size:40px 40px}
.wrap{max-width:640px;margin:0 auto;padding:16px 14px}
.hd{text-align:center;margin-bottom:18px}
.hd-sub{font-size:.68rem;letter-spacing:.24em;color:#6478ff;text-transform:uppercase;margin-bottom:4px}
.hd-title{font-size:1.55rem;font-weight:900;background:linear-gradient(90deg,#8fa8ff,#c8a8ff,#8fc8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.badges{margin-top:8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.card{background:linear-gradient(135deg,rgba(16,16,32,.95),rgba(22,22,44,.9));border-radius:13px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:transform .16s,filter .16s;border-left:4px solid}
.card:hover{transform:translateY(-2px) scale(1.013);filter:brightness(1.1)}
.btn{width:100%;padding:13px;border-radius:12px;border:none;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:filter .14s}
.btn:hover{filter:brightness(1.15)}
.btn-sub{width:100%;padding:10px;border-radius:12px;cursor:pointer;font-size:.8rem;transition:filter .14s;background:rgba(100,120,255,.08);border:1px dashed rgba(100,120,255,.25);color:#667}

.choice:hover{filter:brightness(1.12);transform:translateX(3px)}
.choice.answered{cursor:default;transform:none}
.prog{height:4px;background:#1a1a35;border-radius:4px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;transition:width .4s}
.flash-word{font-size:1.9rem;font-weight:900;color:#f0f0ff;text-align:center;padding:28px 22px;border-radius:18px;margin-bottom:14px;min-height:110px;display:flex;align-items:center;justify-content:center;border:1px solid}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .4s ease}

// ── ユーティリティ ──────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function makeChoices(cards,ci){
  const cor=cards[ci];
  const pool=SOCIAL.flatMap(u=>u.cards);
  const same=shuffle(pool.filter(c=>c.word!==cor.word&&c.type===cor.type));
  const other=shuffle(pool.filter(c=>c.word!==cor.word&&c.type!==cor.type));
  return shuffle([cor,...[...same,...other].slice(0,3)]);
}

// ── 状態 ────────────────────────────────────────────
let state={
  screen:"home", subj:null, unit:null, mode:null,
  deck:[], idx:0, flipped:false,
  choices:[], sel:null,
  score:{ok:0,ng:0},
  input:"", spelOk:null, showAns:false
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

// ── ヘルパー ─────────────────────────────────────────
function startStudy(unit,mode){
  const deck=shuffle(unit.cards);
  const choices=mode==="quiz"?makeChoices(deck,0):[];
  setState({screen:"study",unit,mode,deck,idx:0,flipped:false,choices,sel:null,score:{ok:0,ng:0},input:"",spelOk:null,showAns:false});
}

function goNext(){
  const {idx,deck,mode}=state;
  if(idx+1>=deck.length){setState({screen:"result"});return;}
  const ni=idx+1;
  const choices=mode==="quiz"?makeChoices(deck,ni):[];
  setState({idx:ni,flipped:false,sel:null,choices,input:"",spelOk:null,showAns:false});
}

function pickChoice(c){
  if(state.sel!==null)return;
  const ok=c.word===state.deck[state.idx].word;
  setState({sel:c,score:{ok:state.score.ok+(ok?1:0),ng:state.score.ng+(ok?0:1)}});
}

function checkSpell(){
  const ok=state.input.trim().toLowerCase()===state.deck[state.idx].word.toLowerCase();
  setState({spelOk:ok,score:{ok:state.score.ok+(ok?1:0),ng:state.score.ng+(ok?0:1)}});
}

// ── レンダリング ─────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k==="onClick"){e.addEventListener("click",v);}
    else if(k==="onInput"){e.addEventListener("input",v);}
    else if(k==="onKeydown"){e.addEventListener("keydown",v);}
    else if(k==="disabled"){if(v)e.disabled=true;}
    else if(k==="placeholder"){e.placeholder=v;}
    else if(k==="value"){e.value=v;}
    else if(k==="type"){e.type=v;}
    else{e[k]=v;}
  });
  (children||[]).forEach(c=>{
    if(c==null)return;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

function div(attrs,children){return el("div",attrs,children);}
function btn(attrs,children){const b=el("button",{...attrs},children);b.className=(attrs.className||"")+" btn";return b;}
function span(attrs,children){return el("span",attrs,children);}
function p(attrs,children){return el("p",attrs,children);}
function h1(attrs,children){return el("h1",attrs,children);}
function h2(attrs,children){return el("h2",attrs,children);}
function inp(attrs){return el("input",attrs,[]);}

      div({style:{display:"flex",gap:"8px"}},[
        subj==="en"
          ? el("button",{onClick:()=>startStudy(allUnit,"spell"),style:{flex:1,padding:"8px 0",borderRadius:"9px",background:"rgba(100,120,255,.2)",border:"1px solid rgba(100,120,255,.4)",color:"#dde",fontSize:".8rem",fontWeight:600,cursor:"pointer"}},["✏️ スペル入力"])
          : null,
        subj!=="en"
          ? el("button",{onClick:()=>startStudy(allUnit,"flash"),style:{flex:1,padding:"8px 0",borderRadius:"9px",background:"rgba(100,120,255,.15)",border:"1px solid rgba(100,120,255,.3)",color:"#ccd",fontSize:".8rem",fontWeight:600,cursor:"pointer"}},["📖 フラッシュカード"])
          : null,
        subj!=="en"
          ? el("button",{onClick:()=>startStudy(allUnit,"quiz"),style:{flex:1,padding:"8px 0",borderRadius:"9px",background:"rgba(100,120,255,.2)",border:"1px solid rgba(100,120,255,.4)",color:"#dde",fontSize:".8rem",fontWeight:600,cursor:"pointer"}},["🧠 クイズ"])
          : null,
      ]),
    ]);
    sec.appendChild(mix);
    app.appendChild(sec);
    return;
  }

  // STUDY
  if(screen==="study"&&idx<deck.length){
    const card=deck[idx];
    const sec=div({className:"fade"},[]);

    // topbar
    const tb=div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},[
      span({style:{fontSize:".95rem"}},[unit.icon]),
      span({style:{fontSize:".77rem",color:uc,fontWeight:600}},[unit.label]),
      el("button",{onClick:()=>setState({screen:"units"}),style:{marginLeft:"auto",background:"rgba(100,120,255,.1)",border:"1px solid #334",borderRadius:"8px",color:"#778",padding:"4px 10px",fontSize:".73rem",cursor:"pointer"}},["← 単元選択"]),
    ]);
    sec.appendChild(tb);

    // progress
    const prog=div({className:"prog"},[div({className:"prog-bar",style:{width:`${(idx/total)*100}%`,background:`linear-gradient(90deg,${uc},${uc}88)`}})]);
    sec.appendChild(prog);

    if(card.no) sec.appendChild(div({className:"no-tag"},[`No.${card.no}`]));

    // フラッシュカード
    if(mode==="flash"){
      sec.appendChild(div({className:"flash-word",style:{background:`linear-gradient(135deg,${uc}18,${uc}08)`,borderColor:`${uc}44`}},[card.word]));
      if(!flipped){
        const fb=el("button",{onClick:()=>setState({flipped:true}),style:{width:"100%",padding:"14px",borderRadius:"14px",background:"rgba(100,120,255,.1)",border:"2px dashed rgba(100,120,255,.3)",color:"#8899cc",fontWeight:600,fontSize:".9rem",cursor:"pointer",marginBottom:"14px"}},["タップして説明を見る 👁️"]);
        sec.appendChild(fb);
      } else {
        sec.appendChild(div({className:"flash-desc",style:{borderColor:`${uc}33`}},[card.desc]));
        const row=div({style:{display:"flex",gap:"10px"}},[
          el("button",{onClick:()=>{state.score={ok:state.score.ok,ng:state.score.ng+1};goNext();},style:{flex:1,padding:"13px",borderRadius:"12px",background:"rgba(192,57,43,.18)",border:"1px solid #c0392b66",color:"#f08080",fontWeight:700,fontSize:".9rem",cursor:"pointer"}},["😅 あやふや"]),
          el("button",{onClick:()=>{state.score={ok:state.score.ok+1,ng:state.score.ng};goNext();},style:{flex:1,padding:"13px",borderRadius:"12px",background:"rgba(39,174,96,.18)",border:"1px solid #27ae6066",color:"#7ef0a8",fontWeight:700,fontSize:".9rem",cursor:"pointer"}},["✅ 覚えた！"]),
        ]);
        sec.appendChild(row);
      }
    }

    // クイズ
    if(mode==="quiz"){
      sec.appendChild(div({style:{background:"linear-gradient(135deg,rgba(18,20,44,.97),rgba(22,25,52,.9))",border:`1px solid ${uc}33`,borderRadius:"16px",padding:"20px 18px",marginBottom:"14px"}},[
        div({style:{fontSize:".68rem",color:"#445",marginBottom:"6px"}},["次の説明にあてはまる語句はどれ？"]),
        p({style:{margin:0,fontSize:".9rem",lineHeight:1.8,color:"#c8cce0"}},[card.desc]),
      ]));
      choices.forEach((c,i)=>{
        const answered=sel!==null;
        const isRight=c.word===card.word;
        const picked=sel&&sel.word===c.word;
        let bg="rgba(18,20,44,.85)",bd="1px solid #252545",cl="#ccd",op=1;
        if(answered){
          if(isRight){bg="rgba(39,174,96,.18)";bd="1px solid #27ae6077";cl="#7ef0a8";}
          else if(picked){bg="rgba(192,57,43,.18)";bd="1px solid #c0392b77";cl="#f08080";}
          else op=0.38;
        }
        const lbl=answered?(isRight?"○":picked?"✕":""):["A","B","C","D"][i];
        const lblBg=answered?(isRight?"#27ae60":picked?"#c0392b":"#1a1a35"):"#1a1a35";
        const row=div({className:"choice"+(answered?" answered":""),style:{background:bg,border:bd,color:cl,opacity:op},onClick:answered?null:()=>pickChoice(c)},[
          span({style:{width:"26px",height:"26px",borderRadius:"7px",flexShrink:0,background:lblBg,border:answered?"none":"1px solid #334",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".76rem",fontWeight:700,color:answered?"#fff":"#556"}},[lbl]),
          c.word,
        ]);
        sec.appendChild(row);
      });
      if(sel!==null){
        const ok=sel.word===card.word;
        sec.appendChild(div({className:"result-banner",style:{background:ok?"rgba(39,174,96,.11)":"rgba(192,57,43,.11)",border:`1px solid ${ok?"#27ae60":"#c0392b"}55`,marginBottom:"11px"}},[
          div({style:{fontWeight:700,fontSize:"1.01rem",marginBottom:"5px",color:ok?"#7ef0a8":"#f08080"}},[ok?"🎉 正解！":`😅 不正解… 正解は「${card.word}」`]),
          p({style:{margin:0,fontSize:".81rem",color:"#aab",lineHeight:1.72}},[card.desc]),
        ]));
        const nb=el("button",{onClick:goNext,style:{width:"100%",padding:"13px",borderRadius:"12px",background:`linear-gradient(135deg,${uc},${uc}bb)`,border:"none",color:"#fff",fontWeight:700,fontSize:".95rem",cursor:"pointer"}},
          [idx+1>=total?"結果を見る 🏆":"次へ →"]);
        sec.appendChild(nb);
      }
    }

    // スペル入力
    if(mode==="spell"){
      sec.appendChild(div({style:{background:`linear-gradient(135deg,${uc}18,${uc}08)`,border:`1px solid ${uc}44`,borderRadius:"18px",padding:"24px 22px",textAlign:"center",marginBottom:"16px",minHeight:"90px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"8px"}},[
        div({style:{fontSize:".72rem",color:"#556"}},["次の意味の英単語は？"]),
        div({style:{fontSize:"1.5rem",fontWeight:900,color:"#f0f0ff"}},[card.meaning]),
      ]));
      const bd=spelOk===null?"rgba(100,120,255,.3)":spelOk?"#27ae60":"#c0392b";
      const inpEl=inp({type:"text",placeholder:"英単語を入力してEnter...",disabled:spelOk!==null,value:input,
        style:{width:"100%",padding:"14px 16px",borderRadius:"12px",background:"rgba(20,22,48,.9)",border:`2px solid ${bd}`,color:"#e8e8f0",fontSize:"1.1rem",outline:"none",marginBottom:"12px",textAlign:"center"},
        onInput:e=>{ state.input=e.target.value; },
        onKeydown:e=>{ if(e.key==="Enter"&&spelOk===null&&state.input.trim()!=="") checkSpell(); }
      });
      sec.appendChild(inpEl);
      if(spelOk===null&&input.trim()!==""){
        sec.appendChild(el("button",{onClick:checkSpell,style:{width:"100%",padding:"12px",borderRadius:"12px",background:`linear-gradient(135deg,${uc},${uc}bb)`,border:"none",color:"#fff",fontWeight:700,fontSize:".95rem",cursor:"pointer",marginBottom:"12px"}},["確認する ✅"]));
      }
      if(spelOk===null&&!showAns){
        sec.appendChild(el("button",{onClick:()=>setState({showAns:true}),className:"btn-sub"},["答えを見る 👁️"]));
      }
      if(showAns&&spelOk===null){
        sec.appendChild(div({style:{textAlign:"center",padding:"10px",background:"rgba(100,120,255,.1)",border:"1px solid rgba(100,120,255,.2)",borderRadius:"12px",marginBottom:"12px",fontSize:"1.3rem",fontWeight:900,color:"#8fa8ff"}},[card.word]));
      }
      if(spelOk!==null){
        sec.appendChild(div({className:"result-banner",style:{background:spelOk?"rgba(39,174,96,.12)":"rgba(192,57,43,.12)",border:`1px solid ${spelOk?"#27ae60":"#c0392b"}55`,marginBottom:"12px"}},[
          div({style:{fontWeight:700,fontSize:"1.05rem",marginBottom:"6px",color:spelOk?"#7ef0a8":"#f08080"}},[spelOk?"🎉 正解！":"😅 不正解…"]),
          div({style:{fontSize:".9rem",color:"#aab"}},["正解: ",span({style:{fontSize:"1.1rem",fontWeight:900,color:"#8fa8ff"}},[card.word])]),
        ]));
        sec.appendChild(el("button",{onClick:goNext,style:{width:"100%",padding:"13px",borderRadius:"12px",background:`linear-gradient(135deg,${uc},${uc}bb)`,border:"none",color:"#fff",fontWeight:700,fontSize:".95rem",cursor:"pointer"}},
          [idx+1>=total?"結果を見る 🏆":"次へ →"]));
      }
    }

    app.appendChild(sec);
    return;
  }

  // RESULT
  if(screen==="result"){
    const pct=Math.round(score.ok/total*100);
    const em=score.ok/total>=0.8?"🏆":score.ok/total>=0.5?"👍":"📚";
    const sec=div({className:"fade",style:{textAlign:"center",paddingTop:"20px"}},[
      div({style:{fontSize:"3.5rem",marginBottom:"10px"}},[em]),
      h2({style:{fontSize:"1.3rem",fontWeight:900,marginBottom:"5px",color:uc}},[`${unit.label} 完了！`]),
      mode==="flash"
        ? p({style:{fontSize:"1.4rem",fontWeight:700,marginBottom:"22px"}},[`✅ ${score.ok}語 / ❌ ${score.ng}語`])
        : div({},[
            p({style:{fontSize:"1.9rem",fontWeight:900,marginBottom:"4px"}},[`${score.ok}`,span({style:{fontSize:".95rem",color:"#778"}},[` / ${total} 問正解`])]),
            p({style:{color:"#aab",fontSize:".85rem",marginBottom:"22px"}},[`正解率 ${pct}%`]),
          ]),
      div({style:{display:"flex",gap:"9px",justifyContent:"center",flexWrap:"wrap"}},[
        el("button",{onClick:()=>startStudy(unit,mode),style:{padding:"11px 18px",borderRadius:"11px",background:`linear-gradient(135deg,${uc},${uc}99)`,border:"none",color:"#fff",fontWeight:700,fontSize:".88rem",cursor:"pointer"}},["もう一度"]),
        el("button",{onClick:()=>setState({screen:"units"}),style:{padding:"11px 18px",borderRadius:"11px",background:"rgba(50,50,70,.5)",border:"1px solid #334",color:"#778",fontWeight:700,fontSize:".88rem",cursor:"pointer"}},["← 単元選択"]),
      ]),
    ]);
    app.appendChild(sec);
  }
}

render();
</script>
</body>
</html>
